<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#141a1e">
<title>Review — John's Lexicon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #141a1e;
  --bg-raised: #1b2228;
  --bg-surface: #232c33;
  --ink: #e4e8ec;
  --ink-soft: #b0b8c2;
  --ink-muted: #6e7a86;
  --accent: #3dd8c5;
  --accent-glow: #5eeadb;
  --accent-dim: #2ba898;
  --rule: #2a343c;
  --rule-light: #344049;
  --correct: #5cd67a;
  --correct-bg: #1a2e1f;
  --wrong: #e05c5c;
  --wrong-bg: #2b1c1c;
  --box1: #e05c5c;
  --box2: #e8a44e;
  --box3: #e8d44e;
  --box4: #5cd67a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: var(--bg); }

body {
  font-family: 'Lora', Georgia, serif;
  color: var(--ink);
  background: var(--bg);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* --- HEADER --- */
.header {
  text-align: center;
  padding: 2.5rem 1.5rem 2rem;
  border-bottom: 1px solid var(--rule);
  max-width: 740px;
  margin: 0 auto;
}

.header h1 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 700;
  font-size: 2rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.header .sub {
  font-size: 1.05rem;
  color: var(--ink-muted);
  font-style: italic;
  margin-top: 0.4rem;
}

.back-link {
  display: inline-block;
  font-size: 1rem;
  color: var(--accent);
  text-decoration: none;
  margin-top: 1rem;
  font-weight: 600;
}

.back-link:hover { text-decoration: underline; }

/* --- CONTAINER --- */
.container {
  max-width: 740px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

/* --- LEITNER PROGRESS --- */
.progress-section {
  margin-top: 2.5rem;
  padding-top: 2rem;
  border-top: 1px solid var(--rule);
}

.progress-title {
  font-size: 0.9rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  margin-bottom: 1rem;
}

.leitner-boxes {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  margin-bottom: 1rem;
}

.leitner-box {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.9rem 1.2rem;
  border: 1px solid var(--rule-light);
  background: var(--bg-raised);
}

.leitner-box .box-count {
  font-size: 1.8rem;
  font-weight: 700;
  font-family: 'Cormorant Garamond', Georgia, serif;
  min-width: 2.5rem;
  text-align: center;
}

.leitner-box:nth-child(1) .box-count { color: var(--box1); }
.leitner-box:nth-child(2) .box-count { color: var(--box2); }
.leitner-box:nth-child(3) .box-count { color: var(--box3); }
.leitner-box:nth-child(4) .box-count { color: var(--box4); }

.leitner-box .box-label {
  font-size: 1.05rem;
  color: var(--ink-soft);
}

.streak-line {
  font-size: 1rem;
  color: var(--ink-muted);
  text-align: center;
  padding-top: 0.5rem;
}

.streak-line strong { color: var(--accent); }

/* --- MODE SELECTOR --- */
.mode-selector {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  margin-bottom: 2.5rem;
}

.mode-btn {
  font-family: 'Lora', Georgia, serif;
  color: var(--ink-soft);
  background: var(--bg-raised);
  border: 1px solid var(--rule-light);
  padding: 1.1rem 1.3rem;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 1rem;
}

.mode-btn:hover { border-color: var(--accent-dim); color: var(--ink); }
.mode-btn.active { border-color: var(--accent); color: var(--accent); background: var(--bg-surface); }

.mode-btn .mode-icon { font-size: 1.8rem; flex-shrink: 0; }

.mode-btn .mode-text { display: flex; flex-direction: column; }

.mode-btn .mode-label {
  font-size: 1.15rem;
  font-weight: 600;
}

.mode-btn .mode-desc {
  font-size: 0.95rem;
  color: var(--ink-muted);
  margin-top: 0.1rem;
  font-weight: 400;
}

/* --- GAME AREA --- */
.game-area { min-height: 300px; }

/* --- FLASHCARD --- */
.flashcard-wrapper {
  margin: 0 auto 1.5rem;
  max-width: 560px;
  cursor: pointer;
}

.flashcard-face {
  width: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 2.5rem 2rem;
  border: 1px solid var(--rule-light);
  background: var(--bg-raised);
  min-height: 240px;
}

.flashcard-back { display: none; }
.flashcard-wrapper.revealed .flashcard-front { display: none; }
.flashcard-wrapper.revealed .flashcard-back { display: flex; }

.fc-word {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 2.8rem;
  font-weight: 700;
  margin-bottom: 0.3rem;
}

.fc-pos {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
  color: var(--ink-muted);
  font-size: 1.2rem;
}

.fc-tap {
  font-size: 1rem;
  color: var(--ink-muted);
  margin-top: 1.2rem;
  font-style: italic;
}

.fc-def {
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: 1.15rem;
  line-height: 1.7;
  text-align: center;
  margin-bottom: 1rem;
}

.fc-etym {
  font-size: 1rem;
  color: var(--ink-muted);
  text-align: center;
  line-height: 1.6;
}

.fc-buttons {
  display: flex;
  gap: 0.6rem;
  justify-content: center;
  max-width: 560px;
  margin: 0 auto;
}

.fc-btn {
  font-family: 'Lora', Georgia, serif;
  font-size: 1.05rem;
  font-weight: 600;
  padding: 0.8rem 1.5rem;
  border: 1px solid;
  background: none;
  cursor: pointer;
  flex: 1;
  transition: background 0.2s, color 0.2s;
}

.fc-btn.again { color: var(--wrong); border-color: var(--wrong); }
.fc-btn.again:hover { background: var(--wrong); color: var(--bg); }
.fc-btn.hard { color: var(--accent); border-color: var(--accent-dim); }
.fc-btn.hard:hover { background: var(--accent); color: var(--bg); }
.fc-btn.good { color: var(--box3); border-color: var(--box3); }
.fc-btn.good:hover { background: var(--box3); color: var(--bg); }
.fc-btn.easy { color: var(--correct); border-color: var(--correct); }
.fc-btn.easy:hover { background: var(--correct); color: var(--bg); }

/* --- QUIZ --- */
.quiz-counter {
  text-align: center;
  font-size: 1rem;
  color: var(--ink-muted);
  margin-bottom: 1.2rem;
}

.quiz-question {
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: 1.2rem;
  line-height: 1.7;
  text-align: center;
  color: var(--ink);
  margin-bottom: 1.5rem;
  padding: 1.8rem;
  background: var(--bg-raised);
  border: 1px solid var(--rule-light);
}

.quiz-question .blank {
  color: var(--accent);
  font-weight: 700;
  border-bottom: 2px solid var(--accent-dim);
  padding: 0 0.3rem;
}

.quiz-question .q-label {
  display: block;
  font-family: 'Lora', Georgia, serif;
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-muted);
  margin-bottom: 1rem;
  font-weight: 600;
}

.quiz-choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
  max-width: 600px;
  margin: 0 auto 1.5rem;
}

.quiz-choice {
  font-family: 'Lora', Georgia, serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--ink-soft);
  background: var(--bg-raised);
  border: 1px solid var(--rule-light);
  padding: 1.1rem;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}

.quiz-choice:hover:not(.answered) { border-color: var(--accent-dim); color: var(--ink); }
.quiz-choice.correct { border-color: var(--correct); background: var(--correct-bg); color: var(--ink); cursor: default; }
.quiz-choice.wrong { border-color: var(--wrong); background: var(--wrong-bg); cursor: default; }
.quiz-choice.dimmed { opacity: 0.35; cursor: default; }

.quiz-next {
  display: block;
  margin: 1.2rem auto 0;
  font-family: 'Lora', Georgia, serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--accent);
  background: none;
  border: 1px solid var(--accent-dim);
  padding: 0.75rem 2.5rem;
  cursor: pointer;
}

.quiz-next:hover { background: var(--accent); color: var(--bg); }

/* --- SPEED --- */
.speed-hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
  padding: 1rem 1.2rem;
  background: var(--bg-raised);
  border: 1px solid var(--rule);
}

.speed-timer {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--accent-glow);
}

.speed-score { font-size: 1.1rem; color: var(--ink-soft); }
.speed-score strong { color: var(--accent); }

.speed-start {
  display: block;
  margin: 2rem auto;
  font-family: 'Lora', Georgia, serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--bg);
  background: var(--accent);
  border: none;
  padding: 1.1rem 3.5rem;
  cursor: pointer;
}

.speed-start:hover { background: var(--accent-glow); }

/* --- RESULTS --- */
.results-box {
  text-align: center;
  padding: 3rem 1.5rem;
  background: var(--bg-raised);
  border: 1px solid var(--rule);
}

.results-box .big-number {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 4.5rem;
  font-weight: 700;
  color: var(--accent-glow);
}

.results-box .results-label {
  font-size: 1.1rem;
  color: var(--ink-soft);
  margin-bottom: 1rem;
}

.results-box .feedback {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.3rem;
  line-height: 1.6;
  color: var(--ink);
  margin-bottom: 0.6rem;
  padding: 0 1rem;
}

.results-box .feedback-sub {
  font-size: 1rem;
  color: var(--ink-muted);
  font-style: italic;
  margin-bottom: 1.5rem;
}

.results-box .play-again {
  font-family: 'Lora', Georgia, serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--accent);
  background: none;
  border: 1px solid var(--accent-dim);
  padding: 0.7rem 2rem;
  cursor: pointer;
}

.results-box .play-again:hover { background: var(--accent); color: var(--bg); }

/* --- VOCAB RANK --- */
.vocab-rank {
  text-align: center;
  padding: 1.2rem;
  margin-top: 1rem;
  border: 1px solid var(--rule-light);
  background: var(--bg-surface);
}

.vocab-rank .rank-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 0.2rem;
}

.vocab-rank .rank-desc {
  font-size: 0.95rem;
  color: var(--ink-muted);
  font-style: italic;
}

.empty-state {
  text-align: center;
  padding: 3rem;
  color: var(--ink-muted);
  font-style: italic;
  font-size: 1.1rem;
}

/* --- MOBILE --- */
@media (max-width: 600px) {
  .header { padding: 2rem 1.2rem 1.5rem; }
  .container { padding: 1.5rem 1.2rem 3rem; }
  .quiz-choices { grid-template-columns: 1fr; }
  .fc-word { font-size: 2.2rem; }
  .fc-buttons { flex-wrap: wrap; }
  .fc-btn { flex: 1 1 45%; }
}

/* --- DESKTOP --- */
@media (min-width: 1024px) {
  .container { padding: 2.5rem 2rem 5rem; }
  .flashcard-face { min-height: 300px; padding: 3rem 2.5rem; }
  .fc-def { font-size: 1.25rem; }
  .mode-selector { max-width: 560px; }
  .leitner-boxes { max-width: 560px; }
}
</style>
</head>
<body>

<header class="header">
  <h1>Review</h1>
  <p class="sub">Spaced repetition &mdash; because cramming is for amateurs</p>
  <a href="index.html" class="back-link">&larr; Back to Lexicon</a>
</header>

<div class="container">

  <div class="mode-selector">
    <button class="mode-btn active" data-mode="flashcards" onclick="switchMode('flashcards')">
      <span class="mode-icon">&#x1F4DA;</span>
      <span class="mode-text"><span class="mode-label">Flashcards</span><span class="mode-desc">Spaced repetition with self-rating</span></span>
    </button>
    <button class="mode-btn" data-mode="match" onclick="switchMode('match')">
      <span class="mode-icon">&#x1F3AF;</span>
      <span class="mode-text"><span class="mode-label">Definition Match</span><span class="mode-desc">Match the definition to the word</span></span>
    </button>
    <button class="mode-btn" data-mode="fill" onclick="switchMode('fill')">
      <span class="mode-icon">&#x270D;&#xFE0F;</span>
      <span class="mode-text"><span class="mode-label">Fill the Blank</span><span class="mode-desc">Complete the sentence</span></span>
    </button>
    <button class="mode-btn" data-mode="speed" onclick="switchMode('speed')">
      <span class="mode-icon">&#x26A1;</span>
      <span class="mode-text"><span class="mode-label">Speed Round</span><span class="mode-desc">60-second challenge</span></span>
    </button>
  </div>

  <div class="game-area" id="gameArea"></div>

  <div class="progress-section">
    <div class="progress-title">Your Progress</div>
    <div class="leitner-boxes">
      <div class="leitner-box"><span class="box-count" id="box1Count">0</span><span class="box-label">New</span></div>
      <div class="leitner-box"><span class="box-count" id="box2Count">0</span><span class="box-label">Learning</span></div>
      <div class="leitner-box"><span class="box-count" id="box3Count">0</span><span class="box-label">Reviewing</span></div>
      <div class="leitner-box"><span class="box-count" id="box4Count">0</span><span class="box-label">Mastered</span></div>
    </div>
    <div class="streak-line" id="streakLine"></div>
    <div class="vocab-rank" id="vocabRank"></div>
  </div>

</div>

<script>
let WORDS = [];
let currentMode = 'flashcards';

function loadProgress() { try { return JSON.parse(localStorage.getItem('lexicon-progress')||'{}'); } catch { return {}; } }
function saveProgress(d) { localStorage.setItem('lexicon-progress', JSON.stringify(d)); }
function getBox(w) { return loadProgress()[w]?.box || 1; }
function setBox(w, b) { const p = loadProgress(); if (!p[w]) p[w] = {box:1,lastReview:null,reviews:0}; p[w].box = Math.min(4,Math.max(1,b)); p[w].lastReview = new Date().toISOString(); p[w].reviews = (p[w].reviews||0)+1; saveProgress(p); }

function getTodayStr() { const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function getDateStr(o) { const d = new Date(); d.setDate(d.getDate()+o); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function getStreak() {
  try { const s = JSON.parse(localStorage.getItem('lexicon-streak')||'{}'); const t = getTodayStr(); if (s.lastDay===t) return s.count||0; if (s.lastDay===getDateStr(-1)) return s.count||0; return 0; } catch { return 0; }
}
function recordStreak() {
  const t = getTodayStr(), s = JSON.parse(localStorage.getItem('lexicon-streak')||'{}');
  if (s.lastDay===t) return;
  const c = (s.lastDay===getDateStr(-1)) ? (s.count||0)+1 : 1;
  localStorage.setItem('lexicon-streak', JSON.stringify({lastDay:t, count:c}));
}

function updateProgress() {
  const p = loadProgress(); let c=[0,0,0,0];
  WORDS.forEach(w => { c[(p[w.word]?.box||1)-1]++; });
  document.getElementById('box1Count').textContent = c[0];
  document.getElementById('box2Count').textContent = c[1];
  document.getElementById('box3Count').textContent = c[2];
  document.getElementById('box4Count').textContent = c[3];
  const streak = getStreak();
  document.getElementById('streakLine').innerHTML = streak > 0 ? `<strong>${streak}</strong> day streak` : 'Start your streak by reviewing today';
  // Vocab rank
  const [rankTitle, rankDesc] = getVocabRank();
  const rankEl = document.getElementById('vocabRank');
  if (rankEl) rankEl.innerHTML = `<div class="rank-title">${rankTitle}</div><div class="rank-desc">${rankDesc}</div>`;
}

function switchMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode===m));
  startMode(m);
}

function startMode(m) {
  if (!WORDS.length) { document.getElementById('gameArea').innerHTML='<div class="empty-state">Loading...</div>'; return; }
  if (m==='flashcards') startFlashcards();
  else if (m==='match') startMatch();
  else if (m==='fill') startFill();
  else if (m==='speed') startSpeed();
}

function shuffle(a) { const r=[...a]; for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];} return r; }
function pick(a,n,ex) { return shuffle(ex?a.filter(w=>w.word!==ex):a).slice(0,n); }
function renderEtym(t) { return t.replace(/\*([^*]+)\*/g,'<em>$1</em>'); }
function esc(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function getPriorityQueue() {
  const p=loadProgress(), g=[[],[],[],[]];
  WORDS.forEach(w=>{g[(p[w.word]?.box||1)-1].push(w);});
  return shuffle(g[0]).concat(shuffle(g[1]),shuffle(g[2]),shuffle(g[3]));
}

// === FEEDBACK ENGINE ===
function getMatchFeedback(score, total) {
  const pct = score / total;
  if (pct === 1) return ["Perfect score. You may now refer to yourself as a thaumaturge of definitions.", "The words have nothing left to teach you. For now."];
  if (pct >= 0.8) return ["A strong showing. Not quite inexorable mastery, but the words are starting to fear you.", "One or two slipped past — revisit them before they get comfortable."];
  if (pct >= 0.6) return ["Respectable, but a sartorial vocabulary requires sharper tailoring than this.", "The missed words are waiting for you in the flashcards. They're not going anywhere."];
  if (pct >= 0.4) return ["Your vocabulary knowledge appears to be in a state of torpid hibernation.", "Consider a dalliance with the flashcards before attempting this again."];
  if (pct >= 0.2) return ["This performance may warrant an emergency ethics seminar on the turpitude of not studying.", "The flashcards are free. They're right there. They want to help you."];
  return ["Someone should be defenestrated for this, and that someone might be you.", "Please return to the flashcards immediately. This is not a drill."];
}

function getFillFeedback(score, total) {
  const pct = score / total;
  if (pct === 1) return ["Every blank, filled. Every sentence, completed. You are the mendicant of no one's vocabulary charity.", "You clearly know these words in context. That's the hardest part."];
  if (pct >= 0.8) return ["Near-perfect contextual recall. Your brain is doing something right — don't let it get complacent.", "The few you missed are worth revisiting. Context is everything."];
  if (pct >= 0.6) return ["You know the definitions but the sentences caught you off guard. A tepid performance at best.", "Knowing a word and knowing how to use it are different skills. Practice both."];
  if (pct >= 0.4) return ["The blanks appear to have eviscerated your confidence. Understandable.", "Re-read the example sentences on the main page — they'll stick better than you think."];
  return ["A paroxysm of wrong answers. The sentences are weeping.", "Start with flashcards, then come back. The sentences will wait."];
}

function getSpeedFeedback(score) {
  if (score >= 20) return ["Twenty or more in sixty seconds. Your lexical reflexes are bordering on vertiginous.", "At this speed, you could defenestrate a dictionary and reassemble it mid-fall."];
  if (score >= 15) return ["Fast and mostly accurate. An inexorable march toward vocabulary dominance.", "Your recall speed is getting genuinely impressive."];
  if (score >= 10) return ["A solid pace, though not one that would inspire a peroration in your honor.", "Speed comes with repetition. Play again and watch the number climb."];
  if (score >= 5) return ["Your speed suggests a certain slapdash relationship with these words.", "Slow is fine for flashcards. For speed rounds, it's literally the opposite of the point."];
  return ["You answered fewer than five. The clock is not your friend, and neither are these words. Yet.", "Try the flashcards first to build familiarity, then come back swinging."];
}

function getFlashcardFeedback(total, againCount) {
  const pct = againCount / total;
  if (pct === 0) return ["Not a single 'Again.' Either you're a thaumaturge or you're being too easy on yourself.", "If you rated cards 'Easy' that were actually 'Good,' be honest next time — it helps."];
  if (pct <= 0.15) return ["Nearly all recalled. A few stragglers, but your vocabulary is in fighting shape.", "The ones you hit 'Again' on will resurface first next time. That's the system working."];
  if (pct <= 0.35) return ["A healthy mix of recall and struggle. This is exactly how spaced repetition is supposed to feel.", "The words you forgot aren't failures — they're the whole reason you're here."];
  if (pct <= 0.6) return ["More than a third needed another look. Your vocabulary is feeling neophobic about being tested.", "Consistency beats cramming. Come back tomorrow and those 'Again' cards will surprise you."];
  return ["The majority went straight back to Box 1. This is not a dalliance — this is a relationship. Commit.", "Daily review, even five minutes, will turn this around faster than you'd expect."];
}

function getVocabRank() {
  const p = loadProgress();
  let mastered = 0, reviewing = 0;
  WORDS.forEach(w => { const b = p[w.word]?.box || 1; if (b === 4) mastered++; if (b >= 3) reviewing++; });
  const mp = mastered / WORDS.length, kp = reviewing / WORDS.length;
  if (mp >= 0.9) return ["Lexical Thaumaturge", "You have mastered the dark arts of vocabulary. Most English speakers know 20,000–35,000 words — you're sharpening the rarest blades in the drawer."];
  if (mp >= 0.7) return ["Distinguished Vocabularian", "Your command of these words puts you well above the average educated adult, who passively recognizes far more words than they can wield. You wield."];
  if (mp >= 0.5) return ["Lexical Contender", "Past the halfway mark. Research suggests active vocabulary is only about a third of total recognition vocabulary. You're building the active arsenal."];
  if (kp >= 0.5) return ["Wordsmith-in-Training", "You recognize more than half, but mastery takes repetition. Studies show 5–7 encounters with a word in context before it sticks permanently."];
  if (kp >= 0.25) return ["Apprentice of the Page", "Getting traction. Ebbinghaus showed we lose 70% of new information within 24 hours without review. You're fighting the curve."];
  return ["Neophyte", "Everyone starts here. Spaced repetition can improve retention by over 200% compared to traditional study. The system works if you show up."];
}

function renderResults(big, label, feedbackArr, replayFn) {
  const [fb, fbSub] = feedbackArr;
  return `<div class="results-box">
    <div class="big-number">${big}</div>
    <div class="results-label">${label}</div>
    <div class="feedback">${fb}</div>
    <div class="feedback-sub">${fbSub}</div>
    <button class="play-again" onclick="${replayFn}">Play Again</button>
  </div>`;
}

// === FLASHCARDS ===
let fcQ=[], fcI=0, fcAgain=0;
function startFlashcards() { fcQ=getPriorityQueue(); fcI=0; fcAgain=0; showFC(); }
function showFC() {
  const a=document.getElementById('gameArea');
  if (fcI>=fcQ.length) { a.innerHTML=renderResults(fcQ.length, 'cards reviewed', getFlashcardFeedback(fcQ.length, fcAgain), 'startFlashcards()'); return; }
  const w=fcQ[fcI], box=getBox(w.word), defs=w.definitions.map(d=>`<div>${d}</div>`).join('');
  a.innerHTML=`
    <div class="quiz-counter">Card ${fcI+1} of ${fcQ.length} &middot; Box ${box}</div>
    <div class="flashcard-wrapper" id="fcW" onclick="revealCard()">
      <div class="flashcard-face flashcard-front"><div class="fc-word">${w.word}</div><div class="fc-pos">${w.partOfSpeech}</div><div class="fc-tap">Tap to reveal</div></div>
      <div class="flashcard-face flashcard-back"><div class="fc-def">${defs}</div><div class="fc-etym">${renderEtym(w.etymology)}</div></div>
    </div>
    <div class="fc-buttons" id="fcB" style="display:none">
      <button class="fc-btn again" onclick="rateCard('again')">Again</button>
      <button class="fc-btn hard" onclick="rateCard('hard')">Hard</button>
      <button class="fc-btn good" onclick="rateCard('good')">Good</button>
      <button class="fc-btn easy" onclick="rateCard('easy')">Easy</button>
    </div>`;
}
function revealCard() { const w=document.getElementById('fcW'); if(w.classList.contains('revealed'))return; w.classList.add('revealed'); document.getElementById('fcB').style.display='flex'; }
function rateCard(r) {
  if (r==='again') fcAgain++;
  const w=fcQ[fcI], box=getBox(w.word);
  let nb; if(r==='again')nb=1; else if(r==='hard')nb=Math.max(1,box); else if(r==='good')nb=Math.min(4,box+1); else nb=Math.min(4,box+2);
  setBox(w.word,nb); recordStreak(); updateProgress(); fcI++; showFC();
}

// === DEFINITION MATCH ===
let mQ=[], mI=0, mC=0;
function startMatch() { mQ=shuffle([...WORDS]).slice(0,Math.min(10,WORDS.length)); mI=0; mC=0; showMatch(); }
function showMatch() {
  const a=document.getElementById('gameArea');
  if(mI>=mQ.length){a.innerHTML=renderResults(mC+'/'+mQ.length, 'correct', getMatchFeedback(mC,mQ.length), 'startMatch()');recordStreak();updateProgress();return;}
  const w=mQ[mI], opts=shuffle([w,...pick(WORDS,3,w.word)]);
  a.innerHTML=`<div class="quiz-counter">Question ${mI+1} of ${mQ.length}</div>
    <div class="quiz-question"><span class="q-label">Which word matches this definition?</span>${w.definitions[0]}</div>
    <div class="quiz-choices">${opts.map(o=>`<button class="quiz-choice" data-word="${o.word}" onclick="ansMatch(this,'${w.word}')">${o.word}</button>`).join('')}</div>`;
}
function ansMatch(btn,cw) {
  if(btn.classList.contains('answered'))return;
  const ok=btn.dataset.word===cw;
  document.querySelectorAll('.quiz-choice').forEach(b=>{b.classList.add('answered');if(b.dataset.word===cw)b.classList.add('correct');else if(b===btn&&!ok)b.classList.add('wrong');else b.classList.add('dimmed');});
  if(ok){mC++;setBox(cw,Math.min(4,getBox(cw)+1));}else setBox(cw,1);
  updateProgress();
  const n=document.createElement('button');n.className='quiz-next';n.textContent=mI<mQ.length-1?'Next':'See Results';n.onclick=()=>{mI++;showMatch();};document.getElementById('gameArea').appendChild(n);
}

// === FILL THE BLANK ===
let fQ=[], fI=0, fC=0;
function startFill() { fQ=shuffle(WORDS.filter(w=>w.sentence?.length>10)).slice(0,Math.min(10,WORDS.length)); fI=0; fC=0; showFill(); }
function showFill() {
  const a=document.getElementById('gameArea');
  if(fI>=fQ.length){a.innerHTML=renderResults(fC+'/'+fQ.length, 'correct', getFillFeedback(fC,fQ.length), 'startFill()');recordStreak();updateProgress();return;}
  const w=fQ[fI], stem=w.word.length>4?w.word.slice(0,-1):w.word, re=new RegExp('\\b('+esc(stem)+'[a-z]*)\\b','gi');
  let inflected=w.word; const m=re.exec(w.sentence); if(m)inflected=m[1];
  const blanked=w.sentence.replace(new RegExp('\\b('+esc(stem)+'[a-z]*)\\b','gi'),'<span class="blank">________</span>');
  const dists=pick(WORDS,3,w.word);
  const getInfl=(e)=>{const s=e.word.length>4?e.word.slice(0,-1):e.word;const r=new RegExp('\\b('+esc(s)+'[a-z]*)\\b','gi');const m=r.exec(e.sentence||'');return m?m[1]:e.word;};
  const opts=shuffle([{word:w.word,display:inflected},...dists.map(d=>({word:d.word,display:getInfl(d)}))]);
  a.innerHTML=`<div class="quiz-counter">Question ${fI+1} of ${fQ.length}</div>
    <div class="quiz-question"><span class="q-label">Fill in the blank</span>${blanked}</div>
    <div class="quiz-choices">${opts.map(o=>`<button class="quiz-choice" data-word="${o.word}" onclick="ansFill(this,'${w.word}')">${o.display}</button>`).join('')}</div>`;
}
function ansFill(btn,cw) {
  if(btn.classList.contains('answered'))return;
  const ok=btn.dataset.word===cw;
  document.querySelectorAll('.quiz-choice').forEach(b=>{b.classList.add('answered');if(b.dataset.word===cw)b.classList.add('correct');else if(b===btn&&!ok)b.classList.add('wrong');else b.classList.add('dimmed');});
  if(ok){fC++;setBox(cw,Math.min(4,getBox(cw)+1));}else setBox(cw,1);
  updateProgress();
  const n=document.createElement('button');n.className='quiz-next';n.textContent=fI<fQ.length-1?'Next':'See Results';n.onclick=()=>{fI++;showFill();};document.getElementById('gameArea').appendChild(n);
}

// === SPEED ROUND ===
let sTimer=null,sTime=60,sScore=0;
function startSpeed() {
  document.getElementById('gameArea').innerHTML=`<div style="text-align:center;padding:2.5rem"><p style="font-size:1.15rem;color:var(--ink-soft);margin-bottom:1rem">60 seconds. Definition appears. Pick the right word. Go fast.</p><button class="speed-start" onclick="beginSpeed()">Start</button></div>`;
}
function beginSpeed() { sTime=60; sScore=0; recordStreak(); showSpeedQ(); sTimer=setInterval(()=>{sTime--;const e=document.getElementById('sT');if(e)e.textContent=sTime+'s';if(sTime<=0){clearInterval(sTimer);endSpeed();}},1000); }
function showSpeedQ() {
  const a=document.getElementById('gameArea'), w=WORDS[Math.floor(Math.random()*WORDS.length)], opts=shuffle([w,...pick(WORDS,3,w.word)]);
  a.innerHTML=`<div class="speed-hud"><div class="speed-timer" id="sT">${sTime}s</div><div class="speed-score">Score: <strong id="sS">${sScore}</strong></div></div>
    <div class="quiz-question"><span class="q-label">Which word?</span>${w.definitions[0]}</div>
    <div class="quiz-choices">${opts.map(o=>`<button class="quiz-choice" data-word="${o.word}" onclick="ansSpeed(this,'${w.word}')">${o.word}</button>`).join('')}</div>`;
}
function ansSpeed(btn,cw) {
  if(btn.classList.contains('answered'))return;
  const ok=btn.dataset.word===cw;
  if(ok){sScore++;setBox(cw,Math.min(4,getBox(cw)+1));}else setBox(cw,1);
  updateProgress(); btn.classList.add(ok?'correct':'wrong','answered');
  setTimeout(()=>{if(sTime>0)showSpeedQ();},300);
}
function endSpeed() {
  document.getElementById('gameArea').innerHTML=renderResults(sScore, 'words in 60 seconds', getSpeedFeedback(sScore), 'startSpeed()');
  updateProgress();
}

// === INIT ===
fetch('words.json').then(r=>r.json()).then(words=>{
  WORDS=words.filter(w=>w.date<=getTodayStr());
  updateProgress(); startMode(currentMode);
}).catch(()=>{document.getElementById('gameArea').innerHTML='<div class="empty-state">Unable to load words.</div>';});
</script>
