<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1612">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>John's Lexicon — Daily Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1612;
  --bg-raised: #231e19;
  --bg-surface: #2c251f;
  --ink: #e8ddd0;
  --ink-soft: #bfb3a3;
  --ink-muted: #8a7e71;
  --accent: #d4854a;
  --accent-glow: #e89a5e;
  --accent-dim: #a86838;
  --rule: #3d3429;
  --rule-light: #4a3f33;
  --highlight-bg: #2a2118;
  --correct: #6aad5e;
  --correct-bg: #1e2b1a;
  --wrong: #c7634a;
  --wrong-bg: #2b1c18;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: var(--bg); }

body {
  font-family: 'Lora', Georgia, serif;
  color: var(--ink);
  background: var(--bg);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

/* --- HEADER --- */
.masthead {
  text-align: center;
  padding: 3.5rem 1.5rem 2.5rem;
  border-bottom: 1px solid var(--rule);
  max-width: 740px;
  margin: 0 auto;
}

.masthead-ornament {
  display: block;
  width: 50px;
  height: 2px;
  background: var(--accent);
  margin: 0 auto 1.2rem;
}

.masthead h1 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 700;
  font-size: clamp(2.2rem, 6vw, 3.4rem);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  line-height: 1.1;
}

.masthead .tagline {
  font-style: italic;
  font-size: 1.05rem;
  color: var(--ink-muted);
  margin-top: 0.6rem;
}

/* --- INFO LINE --- */
.info-line {
  max-width: 740px;
  margin: 0 auto;
  padding: 1rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--rule);
  font-size: 0.85rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 500;
}

/* --- REVIEW BANNER --- */
.review-banner {
  max-width: 740px;
  margin: 0 auto;
  border-bottom: 1px solid var(--rule);
}

.review-banner a {
  display: block;
  text-align: center;
  padding: 1.2rem 1.5rem;
  font-family: 'Lora', Georgia, serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--accent);
  text-decoration: none;
  letter-spacing: 0.04em;
  background: var(--bg-raised);
  transition: background 0.2s, color 0.2s;
}

.review-banner a:hover {
  background: var(--accent);
  color: var(--bg);
}

/* --- ENTRIES --- */
.entries {
  max-width: 740px;
  margin: 0 auto;
  padding: 0 1.5rem 5rem;
}

/* --- DATE GROUPS --- */
.date-group {
  padding: 3.5rem 0 0;
}

.date-group + .date-group {
  border-top: 1px solid var(--rule);
  margin-top: 1rem;
}

.date-heading {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--ink-muted);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-bottom: 2rem;
}

.date-group.today {
  background: var(--highlight-bg);
  margin: 0 -1.5rem;
  padding: 3.5rem 1.5rem 0.5rem;
  border-bottom: 2px solid var(--accent-dim);
  position: relative;
}

.date-group.today::before {
  content: "TODAY";
  position: absolute;
  top: 1.2rem;
  right: 1.5rem;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--highlight-bg);
  padding: 0.2rem 0.7rem;
  border: 1px solid var(--accent-dim);
}

/* --- ENTRIES --- */
.entry {
  padding-bottom: 3.5rem;
  animation: fadeUp 0.4s ease both;
}

.entry + .entry {
  padding-top: 3rem;
  border-top: 1px dashed var(--rule);
}

.entry-word {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(2.2rem, 5.5vw, 3rem);
  font-weight: 700;
  line-height: 1.12;
  margin-bottom: 0.25rem;
}

.entry-pos {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
  font-size: 1.2rem;
  color: var(--ink-muted);
  margin-bottom: 1.5rem;
}

.entry-definitions {
  margin-bottom: 1.8rem;
  font-style: normal;
}

.entry-def {
  display: flex;
  gap: 0.6rem;
  margin-bottom: 0.6rem;
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: 1.1rem;
  font-style: normal !important;
  line-height: 1.7;
  color: var(--ink);
}

.entry-def span {
  font-family: 'Libre Baskerville', Georgia, serif;
  font-style: normal;
}

.entry-def-num {
  font-size: 0.9rem;
  color: var(--accent);
  flex-shrink: 0;
  padding-top: 0.2rem;
  font-weight: 600;
}

.entry-etymology {
  font-size: 1rem;
  color: var(--ink-muted);
  line-height: 1.7;
  margin-bottom: 2rem;
  padding-left: 1rem;
  border-left: 2px solid var(--rule-light);
}

.entry-etymology .etym-label {
  font-weight: 600;
  color: var(--ink-soft);
  text-transform: uppercase;
  font-size: 0.75rem;
  letter-spacing: 0.12em;
}

.entry-etymology em {
  color: var(--ink-soft);
  font-style: italic;
}

.entry-sentence {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.25rem;
  font-style: normal;
  line-height: 1.7;
  position: relative;
  padding-left: 1.6rem;
}

.entry-sentence::before {
  content: '\201C';
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 3.2rem;
  color: var(--accent-dim);
  position: absolute;
  left: -0.2rem;
  top: -0.55rem;
  line-height: 1;
}

.entry-sentence .word-highlight {
  font-weight: 700;
  color: var(--accent-glow);
}

/* --- QUIZ --- */
.quiz-section { margin-top: 2rem; }

.quiz-toggle {
  font-family: 'Lora', Georgia, serif;
  font-size: 1rem;
  font-weight: 600;
  color: var(--accent);
  background: none;
  border: 1px solid var(--accent-dim);
  padding: 0.6rem 1.3rem;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}

.quiz-toggle:hover { background: var(--accent); color: var(--bg); }

.quiz-options { display: none; margin-top: 1.2rem; }
.quiz-options.open { display: block; }

.quiz-prompt-text {
  font-size: 1rem;
  color: var(--ink-muted);
  margin-bottom: 0.8rem;
  font-style: italic;
}

.quiz-prompt-text strong { color: var(--accent); font-weight: 600; }

.quiz-option {
  display: block;
  width: 100%;
  text-align: left;
  font-family: 'Lora', Georgia, serif;
  font-size: 1.05rem;
  line-height: 1.6;
  padding: 0.85rem 1rem;
  margin-bottom: 0.5rem;
  border: 1px solid var(--rule-light);
  background: var(--bg-raised);
  color: var(--ink-soft);
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}

.quiz-option:hover:not(.answered) { border-color: var(--accent-dim); background: var(--bg-surface); }
.quiz-option.correct { border-color: var(--correct); background: var(--correct-bg); color: var(--ink); cursor: default; }
.quiz-option.wrong { border-color: var(--wrong); background: var(--wrong-bg); cursor: default; }
.quiz-option.dimmed { opacity: 0.4; cursor: default; }
.quiz-option .option-letter { font-weight: 600; color: var(--accent); margin-right: 0.4rem; }

.quiz-result {
  font-size: 1rem;
  font-style: italic;
  color: var(--ink-muted);
  margin-top: 0.6rem;
  display: none;
}

.quiz-result.show { display: block; }

.quiz-contact {
  display: none;
  margin-top: 0.4rem;
  font-size: 0.95rem;
  font-style: italic;
  color: var(--ink-muted);
}

.quiz-contact.show { display: block; }
.quiz-contact a { color: var(--accent); text-decoration: none; font-weight: 600; }
.quiz-contact a:hover { text-decoration: underline; }

/* --- FOOTER --- */
.archive-footer {
  max-width: 740px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
  border-top: 1px solid var(--rule);
  text-align: center;
}

.archive-footer p {
  font-size: 0.85rem;
  color: var(--ink-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* --- MOBILE --- */
@media (max-width: 600px) {
  .masthead { padding: 2.5rem 1.2rem 2rem; }
  .masthead .tagline { font-size: 1rem; }
  .info-line { padding: 1rem 1.2rem; font-size: 0.85rem; }
  .review-banner a { padding: 1.1rem 1.2rem; font-size: 1.05rem; }
  .entries { padding: 0 1.2rem 4rem; }
  .date-group { padding: 3rem 0 0; }
  .date-group.today { margin: 0 -1.2rem; padding: 3rem 1.2rem 0.5rem; }
  .date-heading { font-size: 0.85rem; margin-bottom: 1.8rem; }
  .entry { padding-bottom: 3rem; }
  .entry + .entry { padding-top: 2.5rem; }
  .entry-pos { font-size: 1.15rem; }
  .entry-def { font-size: 1.05rem; }
  .entry-etymology { font-size: 0.95rem; }
  .entry-sentence { font-size: 1.2rem; }
  .quiz-section { margin-top: 1.8rem; }
}

/* --- DESKTOP --- */
@media (min-width: 1024px) {
  .entries { padding: 0 2rem 6rem; }
  .masthead { padding: 4rem 2rem 3rem; }
  .date-group { padding: 3.5rem 0 0; }
  .entry { padding-bottom: 3.5rem; }
  .entry + .entry { padding-top: 3rem; }
  .entry-def { font-size: 1.15rem; }
  .entry-etymology { font-size: 1.05rem; }
  .entry-sentence { font-size: 1.3rem; }
  .quiz-option { font-size: 1.1rem; }
}

@media print {
  body { background: #fff; color: #000; }
  .entry { break-inside: avoid; }
  .quiz-section, .review-banner { display: none; }
}
</style>
</head>
<body>

<header class="masthead">
  <span class="masthead-ornament"></span>
  <h1>John's Lexicon</h1>
  <p class="tagline">A word a day &mdash; with sentences that go too far</p>
</header>

<div class="info-line">
  <span id="todayDate"></span>
  <span id="wordCount"></span>
</div>

<div class="review-banner">
  <a href="review.html">Review for Quiz &rarr;</a>
</div>

<main class="entries" id="entries"></main>

<footer class="archive-footer">
  <p>New word posted daily</p>
</footer>

<script>
function getTodayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDate(s) {
  return new Date(s + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

function renderEtymology(t) { return t.replace(/\*([^*]+)\*/g, '<em>$1</em>'); }

function renderSentence(s, w) {
  const stem = w.length > 4 ? w.slice(0, -1) : w;
  return s.replace(new RegExp('\\b(' + stem.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '[a-z]*)\\b', 'gi'), '<span class="word-highlight">$1</span>');
}

function shuffleWithMapping(arr) {
  const idx = arr.map((_, i) => i), sh = [...arr];
  for (let i = sh.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [sh[i],sh[j]]=[sh[j],sh[i]]; [idx[i],idx[j]]=[idx[j],idx[i]]; }
  return { shuffled: sh, indices: idx };
}

const L = ['A','B','C','D'];

function renderEntries(words) {
  const c = document.getElementById('entries'), today = getTodayStr();
  const pub = words.filter(w => w.date <= today).sort((a,b) => b.date.localeCompare(a.date));
  const groups = []; let cur = null;
  pub.forEach(w => { if (w.date !== cur) { cur = w.date; groups.push({date:w.date,words:[w]}); } else groups[groups.length-1].words.push(w); });

  document.getElementById('todayDate').textContent = formatDate(groups[0]?.date || '');
  document.getElementById('wordCount').textContent = pub.length + ' words & counting';

  c.innerHTML = groups.map((g, gi) => {
    const isToday = g.date === today;
    const entries = g.words.map(w => {
      const defs = w.definitions.map((d,j) =>
        `<div class="entry-def">${w.definitions.length > 1 ? `<span class="entry-def-num">${j+1}.</span>` : '<span class="entry-def-num">&bull;</span>'}<span>${d}</span></div>`
      ).join('');

      let quiz = '';
      if (w.quiz?.options?.length === 4) {
        const qid = `q-${w.word}-${gi}`;
        const { shuffled, indices } = shuffleWithMapping(w.quiz.options);
        const ci = indices.indexOf(w.quiz.correct);
        quiz = `<div class="quiz-section">
          <button class="quiz-toggle" onclick="toggleQuiz('${qid}')">Test Your Understanding</button>
          <div class="quiz-options" id="${qid}">
            <p class="quiz-prompt-text">Which sentence uses <strong>${w.word}</strong> correctly?</p>
            ${shuffled.map((o,i) => `<button class="quiz-option" data-qid="${qid}" data-correct="${i===ci}" onclick="handleQuiz(this)"><span class="option-letter">${L[i]}.</span> ${o}</button>`).join('')}
            <p class="quiz-result" id="${qid}-r"></p>
            <p class="quiz-contact" id="${qid}-c">Disagree? Contact <a href="sms:6317660898">John</a>.</p>
          </div>
        </div>`;
      }

      return `<article class="entry" id="word-${w.word}">
        <h2 class="entry-word">${w.word}</h2>
        <div class="entry-pos">${w.partOfSpeech}</div>
        <div class="entry-definitions">${defs}</div>
        <div class="entry-etymology"><span class="etym-label">Origin</span>&ensp;${renderEtymology(w.etymology)}</div>
        <div class="entry-sentence">${renderSentence(w.sentence, w.word)}</div>
        ${quiz}
      </article>`;
    }).join('');

    return `<section class="date-group${isToday?' today':''}"><div class="date-heading">${formatDate(g.date)}</div>${entries}</section>`;
  }).join('');
}

function toggleQuiz(id) { document.getElementById(id).classList.toggle('open'); }

function handleQuiz(btn) {
  if (btn.classList.contains('answered')) return;
  const qid = btn.dataset.qid, ok = btn.dataset.correct === 'true';
  document.querySelectorAll(`[data-qid="${qid}"]`).forEach(b => {
    b.classList.add('answered');
    if (b.dataset.correct === 'true') b.classList.add('correct');
    else if (b === btn && !ok) b.classList.add('wrong');
    else b.classList.add('dimmed');
  });
  const r = document.getElementById(`${qid}-r`);
  r.classList.add('show');
  if (ok) { r.textContent = 'Correct.'; }
  else { r.textContent = 'Not quite — the correct answer is highlighted above.'; document.getElementById(`${qid}-c`).classList.add('show'); }
}

fetch('words.json').then(r=>r.json()).then(renderEntries).catch(()=>{
  document.getElementById('entries').innerHTML='<p style="text-align:center;padding:3rem;color:var(--ink-muted)">Unable to load words.</p>';
});
</script>
</body>
</html>
