<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#141a1e">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>John's Lexicon — Daily Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Serif:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #141a1e;
  --bg-raised: #1b2228;
  --bg-surface: #232c33;
  --ink: #e4e8ec;
  --ink-soft: #b0b8c2;
  --ink-muted: #6e7a86;
  --accent: #3dd8c5;
  --accent-glow: #5eeadb;
  --accent-dim: #2ba898;
  --rule: #2a343c;
  --rule-light: #344049;
  --highlight-bg: #182226;
  --correct: #5cd67a;
  --correct-bg: #1a2e1f;
  --wrong: #e05c5c;
  --wrong-bg: #2b1c1c;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: var(--bg); }

body {
  font-family: 'Lora', Georgia, serif;
  color: var(--ink);
  background: var(--bg);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

/* --- HEADER --- */
.masthead {
  text-align: center;
  padding: 3.5rem 1.5rem 2.5rem;
  border-bottom: 1px solid var(--rule);
  max-width: 740px;
  margin: 0 auto;
}

.epigraph {
  margin-bottom: 2rem;
}

.epigraph p {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.5rem;
  font-style: italic;
  line-height: 1.7;
  color: var(--ink-soft);
}

.epigraph-attr {
  display: block;
  font-family: 'Lora', Georgia, serif;
  font-size: 1.1rem;
  color: var(--ink-muted);
  margin-top: 0.5rem;
}

.masthead-ornament {
  display: block;
  width: 50px;
  height: 2px;
  background: var(--accent);
  margin: 0 auto 1.2rem;
}

.masthead h1 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 700;
  font-size: clamp(2.2rem, 6vw, 3.4rem);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  line-height: 1.1;
}

.masthead .tagline {
  font-style: italic;
  font-size: 1.2rem;
  color: var(--ink-soft);
  margin-top: 0.6rem;
}

/* --- INFO LINE --- */
.info-line {
  max-width: 740px;
  margin: 0 auto;
  padding: 1.2rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--rule);
  font-size: 1rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 500;
}

/* --- REVIEW BANNER --- */
.review-banner {
  max-width: 740px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem;
}

.review-banner a {
  display: block;
  text-align: center;
  padding: 1.4rem 1.5rem;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--bg);
  text-decoration: none;
  background: var(--accent);
  transition: background 0.2s;
}

.review-banner a:hover {
  background: var(--accent-glow);
}

/* --- ENTRIES --- */
.entries {
  max-width: 740px;
  margin: 0 auto;
  padding: 0 1.5rem 5rem;
}

/* --- DATE GROUPS --- */
.date-group {
  padding: 3.5rem 0 0;
}

.date-group + .date-group {
  border-top: 1px solid var(--rule);
  margin-top: 1rem;
}

.date-heading {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--ink-muted);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-bottom: 2rem;
}

.date-group.today {
  background: var(--highlight-bg);
  margin: 0 -1.5rem;
  padding: 3.5rem 1.5rem 0.5rem;
  border-bottom: 2px solid var(--accent-dim);
  position: relative;
}

.date-group.today::before {
  content: "TODAY";
  position: absolute;
  top: 1.2rem;
  right: 1.5rem;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--highlight-bg);
  padding: 0.2rem 0.7rem;
  border: 1px solid var(--accent-dim);
}

/* --- ENTRIES --- */
.entry {
  padding-bottom: 3.5rem;
  animation: fadeUp 0.4s ease both;
}

.entry + .entry {
  padding-top: 3rem;
  border-top: 1px dashed var(--rule);
}

.entry-word {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(2.2rem, 5.5vw, 3rem);
  font-weight: 700;
  line-height: 1.12;
  margin-bottom: 0.25rem;
}

.entry-pronunciation {
  font-family: 'Lora', Georgia, serif;
  font-size: 1.05rem;
  color: var(--ink-muted);
  margin-bottom: 0.3rem;
  display: flex;
  align-items: baseline;
  gap: 0.8rem;
  flex-wrap: wrap;
}

.pron-simple {
  color: var(--ink-soft);
  font-weight: 500;
}

.pron-ipa {
  font-family: 'Noto Serif', Georgia, serif;
  font-size: 1.05rem;
  color: var(--ink-muted);
  position: relative;
  letter-spacing: 0.12em;
  word-spacing: 0.1em;
}

.ipa-sym {
  cursor: pointer;
  color: var(--ink-muted);
  position: relative;
  display: inline-block;
  border-bottom: 1px dotted var(--rule-light);
  transition: color 0.15s;
  font-family: 'Noto Serif', Georgia, serif;
  padding: 0 0.1rem;
  letter-spacing: 0.08em;
}

.ipa-sym:hover { color: var(--accent); }

.ipa-tooltip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-surface);
  border: 1px solid var(--accent-dim);
  color: var(--ink);
  font-size: 0.95rem;
  padding: 0.55rem 0.9rem;
  white-space: nowrap;
  z-index: 100;
  pointer-events: none;
  font-style: normal;
  font-family: 'Noto Serif', Georgia, serif;
  line-height: 1.4;
}

.ipa-tooltip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: var(--accent-dim);
}

.entry-pos {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
  font-size: 1.4rem;
  color: var(--accent-dim);
  margin-bottom: 1.5rem;
}

.entry-definitions {
  margin-bottom: 1.8rem;
  font-style: normal;
}

.entry-def {
  display: flex;
  gap: 0.6rem;
  margin-bottom: 0.6rem;
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: 1.2rem;
  font-style: normal !important;
  line-height: 1.7;
  color: var(--ink);
}

.entry-def span {
  font-family: 'Libre Baskerville', Georgia, serif;
  font-style: normal;
}

.entry-def-num {
  font-size: 1rem;
  color: var(--accent);
  flex-shrink: 0;
  padding-top: 0.2rem;
  font-weight: 600;
}

.entry-etymology {
  font-size: 1.05rem;
  color: var(--ink-muted);
  line-height: 1.7;
  margin-bottom: 2rem;
  padding-left: 1rem;
  border-left: 2px solid var(--rule-light);
}

.entry-etymology .etym-label {
  font-weight: 600;
  color: var(--ink-soft);
  text-transform: uppercase;
  font-size: 0.82rem;
  letter-spacing: 0.12em;
}

.entry-etymology em {
  color: var(--ink-soft);
  font-style: italic;
}

.entry-sentence {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.25rem;
  font-style: normal;
  line-height: 1.7;
  position: relative;
  padding-left: 1.6rem;
}

.entry-sentence::before {
  content: '\201C';
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 3.2rem;
  color: var(--accent-dim);
  position: absolute;
  left: -0.2rem;
  top: -0.55rem;
  line-height: 1;
}

.entry-sentence .word-highlight {
  font-weight: 700;
  color: var(--accent-glow);
}

/* --- QUIZ --- */
.quiz-section { margin-top: 2rem; }

.quiz-toggle {
  font-family: 'Lora', Georgia, serif;
  font-size: 1rem;
  font-weight: 600;
  color: var(--accent);
  background: none;
  border: 1px solid var(--accent-dim);
  padding: 0.6rem 1.3rem;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}

.quiz-toggle:hover { background: var(--accent); color: var(--bg); }

.quiz-options { display: none; margin-top: 1.2rem; }
.quiz-options.open { display: block; }

.quiz-prompt-text {
  font-size: 1rem;
  color: var(--ink-muted);
  margin-bottom: 0.8rem;
  font-style: italic;
}

.quiz-prompt-text strong { color: var(--accent); font-weight: 600; }

.quiz-option {
  display: block;
  width: 100%;
  text-align: left;
  font-family: 'Lora', Georgia, serif;
  font-size: 1.05rem;
  line-height: 1.6;
  padding: 0.85rem 1rem;
  margin-bottom: 0.5rem;
  border: 1px solid var(--rule-light);
  background: var(--bg-raised);
  color: var(--ink-soft);
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}

.quiz-option:hover:not(.answered) { border-color: var(--accent-dim); background: var(--bg-surface); }
.quiz-option.correct { border-color: var(--correct); background: var(--correct-bg); color: var(--ink); cursor: default; }
.quiz-option.wrong { border-color: var(--wrong); background: var(--wrong-bg); cursor: default; }
.quiz-option.dimmed { opacity: 0.4; cursor: default; }
.quiz-option .option-letter { font-weight: 600; color: var(--accent); margin-right: 0.4rem; }

.quiz-result {
  font-size: 1rem;
  font-style: italic;
  color: var(--ink-muted);
  margin-top: 0.6rem;
  display: none;
}

.quiz-result.show { display: block; }

.quiz-contact {
  display: none;
  margin-top: 0.4rem;
  font-size: 0.95rem;
  font-style: italic;
  color: var(--ink-muted);
}

.quiz-contact.show { display: block; }
.quiz-contact a { color: var(--accent); text-decoration: none; font-weight: 600; }
.quiz-contact a:hover { text-decoration: underline; }

/* --- VIEW BAR --- */
.view-bar {
  max-width: 740px;
  margin: 0 auto;
  padding: 1rem 1.5rem;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.5rem;
  border-bottom: 1px solid var(--rule);
}

.view-label {
  font-size: 0.9rem;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
  margin-right: 0.3rem;
  width: 100%;
  margin-bottom: 0.2rem;
}

.view-btn {
  font-family: 'Lora', Georgia, serif;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--ink-muted);
  background: none;
  border: 1px solid var(--rule-light);
  padding: 0.4rem 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}

.view-btn:hover { border-color: var(--accent-dim); color: var(--ink-soft); }
.view-btn.active { border-color: var(--accent); color: var(--accent); background: var(--bg-raised); }

/* --- FLIP GRID --- */
.flip-grid {
  max-width: 740px;
  margin: 0 auto;
  padding: 1.5rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 0.8rem;
}

.flip-card {
  perspective: 800px;
  cursor: pointer;
  height: 120px;
}

.flip-card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.5s;
  transform-style: preserve-3d;
}

.flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }

.flip-card-front, .flip-card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 0.8rem;
  border: 1px solid var(--rule-light);
  background: var(--bg-raised);
}

.flip-card-back {
  transform: rotateY(180deg);
  background: var(--bg-surface);
  border-color: var(--accent-dim);
}

.flip-card-word {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--ink);
}

.flip-card-pos {
  font-size: 0.8rem;
  color: var(--accent-dim);
  font-style: italic;
  margin-top: 0.2rem;
}

.flip-card-def {
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: 0.78rem;
  line-height: 1.4;
  color: var(--ink-soft);
  text-align: center;
  overflow: hidden;
}

/* --- CONNECTIONS WEB --- */
.web-container {
  max-width: 740px;
  margin: 0 auto;
  padding: 1.5rem;
}

.web-cluster {
  margin-bottom: 2rem;
  padding: 1.5rem;
  border: 1px solid var(--rule-light);
  background: var(--bg-raised);
}

.web-cluster-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 0.3rem;
}

.web-cluster-desc {
  font-size: 0.9rem;
  color: var(--ink-muted);
  font-style: italic;
  margin-bottom: 1rem;
}

.web-words {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.web-word {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--ink);
  padding: 0.5rem 1rem;
  border: 1px solid var(--rule-light);
  background: var(--bg);
  cursor: pointer;
  transition: all 0.2s;
}

.web-word:hover { border-color: var(--accent); color: var(--accent); }

.web-word-detail {
  margin-top: 1rem;
  padding: 1rem;
  border-top: 1px solid var(--rule);
  font-size: 1rem;
  color: var(--ink-soft);
  line-height: 1.6;
  display: none;
}

.web-word-detail.open { display: block; }

.web-word-detail strong { color: var(--ink); }

/* --- GROUPED VIEW (origin, pos) --- */
.grouped-view {
  max-width: 740px;
  margin: 0 auto;
  padding: 1.5rem;
}

.group-tiles {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 0.8rem;
}

.group-tile {
  padding: 1.2rem;
  border: 1px solid var(--rule-light);
  background: var(--bg-raised);
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}

.group-tile:hover { border-color: var(--accent-dim); }
.group-tile.active { border-color: var(--accent); background: var(--bg-surface); }

.group-tile-name {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--ink);
}

.group-tile.active .group-tile-name { color: var(--accent); }

.group-tile-count {
  font-size: 0.85rem;
  color: var(--ink-muted);
  margin-top: 0.2rem;
}

.group-expanded {
  margin-top: 1.2rem;
  display: none;
}

.group-expanded.open { display: block; }

.group-word-tiles {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 0.6rem;
  margin-bottom: 1rem;
}

.group-word-tile {
  padding: 0.8rem;
  border: 1px solid var(--rule-light);
  background: var(--bg-raised);
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}

.group-word-tile:hover { border-color: var(--accent-dim); }
.group-word-tile.active { border-color: var(--accent); background: var(--bg-surface); }

.group-word-tile-name {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--ink);
}

.group-word-tile.active .group-word-tile-name { color: var(--accent); }

.group-word-tile-pos {
  font-size: 0.8rem;
  color: var(--accent-dim);
  font-style: italic;
}

.group-word-detail {
  display: none;
  margin-bottom: 1rem;
}

.group-word-detail.open { display: block; }

/* --- FOOTER --- */
.archive-footer {
  max-width: 740px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
  border-top: 1px solid var(--rule);
  text-align: center;
}

.archive-footer p {
  font-size: 0.85rem;
  color: var(--ink-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* --- MOBILE --- */
@media (max-width: 600px) {
  .masthead { padding: 2.5rem 1.2rem 2rem; }
  .masthead .tagline { font-size: 1.15rem; }
  .info-line {
    padding: 1rem 1.2rem;
    font-size: 0.95rem;
    flex-direction: column;
    gap: 0.3rem;
    text-align: center;
  }
  .review-banner { padding: 2rem 1.2rem; }
  .review-banner a { font-size: 1.15rem; padding: 1.3rem; }
  .entries { padding: 0 1.2rem 4rem; }
  .date-group { padding: 3rem 0 0; }
  .date-group.today { margin: 0 -1.2rem; padding: 3rem 1.2rem 0.5rem; }
  .date-heading { font-size: 0.9rem; margin-bottom: 1.8rem; }
  .entry { padding-bottom: 3rem; }
  .entry + .entry { padding-top: 2.5rem; }
  .entry-pos { font-size: 1.3rem; }
  .entry-def { font-size: 1.15rem; }
  .entry-def-num { font-size: 1rem; }
  .entry-etymology { font-size: 1.05rem; }
  .entry-sentence { font-size: 1.2rem; }
  .quiz-toggle { font-size: 1.05rem; }
  .quiz-prompt-text { font-size: 1.05rem; }
  .quiz-option { font-size: 1.05rem; padding: 0.9rem 1rem; }
  .quiz-result { font-size: 1.05rem; }
  .quiz-contact { font-size: 1rem; }
  .quiz-section { margin-top: 1.8rem; }
  .entry-pronunciation { font-size: 1rem; }
  .view-bar { padding: 0.9rem 1.2rem; }
  .view-btn { font-size: 0.85rem; padding: 0.35rem 0.7rem; }
  .flip-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); padding: 1rem 1.2rem; }
  .flip-card { height: 110px; }
  .web-container { padding: 1rem 1.2rem; }
  .grouped-view { padding: 1rem 1.2rem; }
  .group-tiles { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  .group-word-tiles { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
}

/* --- DESKTOP --- */
@media (min-width: 1024px) {
  .entries { padding: 0 2rem 6rem; }
  .masthead { padding: 4rem 2rem 3rem; }
  .masthead .tagline { font-size: 1.3rem; }
  .info-line { font-size: 1.05rem; }
  .date-group { padding: 3.5rem 0 0; }
  .entry { padding-bottom: 3.5rem; }
  .entry + .entry { padding-top: 3rem; }
  .entry-pos { font-size: 1.5rem; }
  .entry-def { font-size: 1.25rem; }
  .entry-etymology { font-size: 1.1rem; }
  .entry-sentence { font-size: 1.35rem; }
  .quiz-option { font-size: 1.1rem; }
}

@media print {
  body { background: #fff; color: #000; }
  .entry { break-inside: avoid; }
  .quiz-section, .review-banner { display: none; }
}
</style>
</head>
<body>

<header class="masthead">
  <div class="epigraph">
    <p>&ldquo;The love of learning, the sequestered nooks,<br>And all the sweet serenity of books&rdquo;</p>
    <span class="epigraph-attr">&mdash; Henry Wadsworth Longfellow</span>
  </div>
  <span class="masthead-ornament"></span>
  <h1>John's Lexicon</h1>
  <p class="tagline">A word a day, with sentences that go too far</p>
</header>

<div class="info-line">
  <span id="todayDate"></span>
  <span id="wordCount"></span>
</div>

<div class="review-banner">
  <a href="review.html">Review for Quiz &rarr;</a>
</div>

<div class="view-bar">
  <span class="view-label">View</span>
  <button class="view-btn active" onclick="setView('date')">Date</button>
  <button class="view-btn" onclick="setView('alpha')">A &ndash; Z</button>
  <button class="view-btn" onclick="setView('flip')">Flip Grid</button>
  <button class="view-btn" onclick="setView('pos')">Part of Speech</button>
  <button class="view-btn" onclick="setView('origin')">Origin</button>
  <button class="view-btn" onclick="setView('web')">Connections</button>
</div>

<div id="mainContent">
  <main class="entries" id="entries"></main>
</div>

<footer class="archive-footer">
  <p>New word posted daily</p>
</footer>

<script>
function getTodayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDate(s) {
  return new Date(s + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

function renderEtymology(t) { return t.replace(/\*([^*]+)\*/g, '<em>$1</em>'); }

function renderSentence(s, w) {
  const stem = w.length > 4 ? w.slice(0, -1) : w;
  return s.replace(new RegExp('\\b(' + stem.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '[a-z]*)\\b', 'gi'), '<span class="word-highlight">$1</span>');
}

// IPA symbol explanations — multi-char symbols must come first
const IPA_MAP = [
  ['dʒ', 'the J sound, as in judge'],
  ['tʃ', 'the CH sound, as in church'],
  ['aɪ', 'the EYE sound, as in price'],
  ['eɪ', 'the AY sound, as in face'],
  ['ɔɪ', 'the OY sound, as in choice'],
  ['oʊ', 'the OH sound, as in goat'],
  ['aʊ', 'the OW sound, as in mouth'],
  ['iː', 'long EE, as in see'],
  ['uː', 'long OO, as in food'],
  ['ɔː', 'the AW sound, as in law'],
  ['ɜː', 'the UR sound, as in bird'],
  ['ɑː', 'the AH sound, as in father'],
  ['ˈ', 'primary stress on next syllable'],
  ['ˌ', 'secondary stress on next syllable'],
  ['ə', 'the UH sound, as in about'],
  ['æ', 'the A in cat'],
  ['ɪ', 'short I, as in kit'],
  ['ɛ', 'the E in bed'],
  ['ɔ', 'the AW sound, as in thought'],
  ['ʊ', 'short OO, as in foot'],
  ['ʃ', 'the SH sound, as in ship'],
  ['ʒ', 'the ZH sound, as in measure'],
  ['θ', 'the TH in think (voiceless)'],
  ['ð', 'the TH in this (voiced)'],
  ['ŋ', 'the NG sound, as in sing'],
  ['ɜ', 'the UR sound, as in nurse'],
  ['ɑ', 'the AH sound, as in father'],
];

// Build a quick lookup from symbol to description
const IPA_LOOKUP = {};
IPA_MAP.forEach(([sym, desc]) => { IPA_LOOKUP[sym] = desc; });

function renderIPA(ipa) {
  if (!ipa) return '';
  let result = '';
  let i = 0;
  while (i < ipa.length) {
    if ('/. '.includes(ipa[i])) { result += ipa[i]; i++; continue; }
    let matched = false;
    for (const [sym] of IPA_MAP) {
      if (ipa.substring(i, i + sym.length) === sym) {
        result += `<span class="ipa-sym" data-ipa="${sym}">${sym}</span>`;
        i += sym.length;
        matched = true;
        break;
      }
    }
    if (!matched) { result += ipa[i]; i++; }
  }
  return result;
}

function shuffleWithMapping(arr) {
  const idx = arr.map((_, i) => i), sh = [...arr];
  for (let i = sh.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [sh[i],sh[j]]=[sh[j],sh[i]]; [idx[i],idx[j]]=[idx[j],idx[i]]; }
  return { shuffled: sh, indices: idx };
}

const L = ['A','B','C','D'];
let ALL_WORDS = [];

function renderEntry(w, gi) {
  const defs = w.definitions.map((d,j) =>
    `<div class="entry-def">${w.definitions.length > 1 ? `<span class="entry-def-num">${j+1}.</span>` : '<span class="entry-def-num">&bull;</span>'}<span>${d}</span></div>`
  ).join('');

  let quiz = '';
  if (w.quiz?.options?.length === 4) {
    const qid = `q-${w.word}-${gi}`;
    const { shuffled, indices } = shuffleWithMapping(w.quiz.options);
    const ci = indices.indexOf(w.quiz.correct);
    quiz = `<div class="quiz-section">
      <button class="quiz-toggle" onclick="toggleQuiz('${qid}')">Test Your Understanding</button>
      <div class="quiz-options" id="${qid}">
        <p class="quiz-prompt-text">Which sentence uses <strong>${w.word}</strong> correctly?</p>
        ${shuffled.map((o,i) => `<button class="quiz-option" data-qid="${qid}" data-correct="${i===ci}" onclick="handleQuiz(this)"><span class="option-letter">${L[i]}.</span> ${o}</button>`).join('')}
        <p class="quiz-result" id="${qid}-r"></p>
        <p class="quiz-contact" id="${qid}-c">Disagree? Contact <a href="sms:6317660898">John</a>.</p>
      </div>
    </div>`;
  }

  return `<article class="entry" id="word-${w.word}">
    <h2 class="entry-word">${w.word}</h2>
    ${w.pronunciation ? `<div class="entry-pronunciation"><span class="pron-simple">${w.pronunciation}</span>${w.ipa ? `<span class="pron-ipa">${renderIPA(w.ipa)}</span>` : ''}</div>` : ''}
    <div class="entry-pos">${w.partOfSpeech}</div>
    <div class="entry-definitions">${defs}</div>
    <div class="entry-etymology"><span class="etym-label">Origin</span>&ensp;${renderEtymology(w.etymology)}</div>
    <div class="entry-sentence">${renderSentence(w.sentence, w.word)}</div>
    ${quiz}
  </article>`;
}

function renderByDate(words) {
  const c = document.getElementById('entries'), today = getTodayStr();
  const pub = words.sort((a,b) => b.date.localeCompare(a.date));
  const groups = []; let cur = null;
  pub.forEach(w => { if (w.date !== cur) { cur = w.date; groups.push({date:w.date,words:[w]}); } else groups[groups.length-1].words.push(w); });

  c.innerHTML = groups.map((g, gi) => {
    const isToday = g.date === today;
    const entries = g.words.map(w => renderEntry(w, gi)).join('');
    return `<section class="date-group${isToday?' today':''}"><div class="date-heading">${formatDate(g.date)}</div>${entries}</section>`;
  }).join('');
}

function renderAlpha(words) {
  const c = document.getElementById('entries');
  const sorted = [...words].sort((a,b) => a.word.localeCompare(b.word));

  // Group by first letter
  const groups = []; let curLetter = null;
  sorted.forEach(w => {
    const letter = w.word[0].toUpperCase();
    if (letter !== curLetter) { curLetter = letter; groups.push({letter, words:[w]}); }
    else groups[groups.length-1].words.push(w);
  });

  c.innerHTML = groups.map((g, gi) => {
    const entries = g.words.map(w => renderEntry(w, gi)).join('');
    return `<section class="date-group"><div class="date-heading">${g.letter}</div>${entries}</section>`;
  }).join('');
}

function renderEntries(words) {
  const today = getTodayStr();
  ALL_WORDS = words.filter(w => w.date <= today);
  document.getElementById('todayDate').textContent = formatDate(ALL_WORDS[0]?.date || '');
  document.getElementById('wordCount').innerHTML = '<span style="color:var(--accent)">' + ALL_WORDS.length + '</span> words & counting';
  renderByDate([...ALL_WORDS]);
}

// === WORD METADATA ===
const ORIGINS = {
  'elegiac':'Greek','eviscerate':'Latin','defenestrate':'Latin','sartorial':'Latin',
  'slapdash':'English','paroxysm':'Greek','dalliance':'Middle English','peroration':'Latin',
  'turgid':'Latin','turbid':'Latin','turpitude':'Latin','torrid':'Latin','tepid':'Latin',
  'torpid':'Latin','thaumaturge':'Greek','neophobic':'Greek','effusive':'Latin',
  'propriety':'French/Latin','mendicant':'Latin','jocularity':'Latin','inexorable':'Latin',
  'defalcate':'Latin','adenoidal':'Greek','vertiginous':'Latin','frippery':'French',
  'valediction':'Latin','taciturn':'Latin'
};

const CLUSTERS = [
  { title:'The T-Words', desc:'Seven Latin words that sound alike and love to be confused', words:['turgid','turbid','turpitude','torrid','torpid','tepid','taciturn'] },
  { title:'Acts of Removal', desc:'Latin verbs for taking things out — of windows, bodies, and accounts', words:['defenestrate','eviscerate','defalcate'] },
  { title:'Greek Roots', desc:'Words built from Greek that never quite naturalized into plain English', words:['thaumaturge','neophobic','paroxysm','adenoidal','elegiac'] },
  { title:'Speech & Silence', desc:'The spectrum from saying too much to saying nothing at all', words:['peroration','effusive','taciturn','jocularity'] },
];

function setView(mode) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[onclick="setView('${mode}')"]`).classList.add('active');
  const content = document.getElementById('mainContent');

  if (mode === 'date') {
    content.innerHTML = '<main class="entries" id="entries"></main>';
    renderByDate([...ALL_WORDS]);
  } else if (mode === 'alpha') {
    content.innerHTML = '<main class="entries" id="entries"></main>';
    renderAlpha([...ALL_WORDS]);
  } else if (mode === 'flip') {
    renderFlipGrid(content);
  } else if (mode === 'pos') {
    renderByPOS(content);
  } else if (mode === 'origin') {
    renderByOrigin(content);
  } else if (mode === 'web') {
    renderWeb(content);
  }
}

function renderFlipGrid(container) {
  const sorted = [...ALL_WORDS].sort((a,b) => a.word.localeCompare(b.word));
  container.innerHTML = `<div class="flip-grid">${sorted.map(w =>
    `<div class="flip-card" onclick="this.classList.toggle('flipped')">
      <div class="flip-card-inner">
        <div class="flip-card-front">
          <div class="flip-card-word">${w.word}</div>
          <div class="flip-card-pos">${w.partOfSpeech}</div>
        </div>
        <div class="flip-card-back">
          <div class="flip-card-def">${w.definitions[0]}</div>
        </div>
      </div>
    </div>`
  ).join('')}</div>`;
}

function renderByPOS(container) {
  const groups = {};
  ALL_WORDS.forEach(w => {
    const pos = w.partOfSpeech;
    if (!groups[pos]) groups[pos] = [];
    groups[pos].push(w);
  });
  const order = ['noun','verb','adjective','adverb'];
  const posLabels = { noun:'Nouns', verb:'Verbs', adjective:'Adjectives', adverb:'Adverbs' };

  container.innerHTML = `<div class="grouped-view">
    <div class="group-tiles">${order.filter(p => groups[p]).map(pos =>
      `<div class="group-tile" onclick="toggleGroup(this, 'pos-${pos}')">
        <div class="group-tile-name">${posLabels[pos]}</div>
        <div class="group-tile-count">${groups[pos].length} words</div>
      </div>`
    ).join('')}</div>
    ${order.filter(p => groups[p]).map(pos => {
      const words = groups[pos].sort((a,b) => a.word.localeCompare(b.word));
      return `<div class="group-expanded" id="pos-${pos}">
        <div class="group-word-tiles">${words.map(w =>
          `<div class="group-word-tile" onclick="toggleGroupWord(this, 'pwd-${pos}-${w.word}')">
            <div class="group-word-tile-name">${w.word}</div>
          </div>`
        ).join('')}</div>
        ${words.map(w => `<div class="group-word-detail" id="pwd-${pos}-${w.word}">${renderEntry(w, 0)}</div>`).join('')}
      </div>`;
    }).join('')}
  </div>`;
}

function renderByOrigin(container) {
  const groups = {};
  ALL_WORDS.forEach(w => {
    const origin = ORIGINS[w.word] || 'Other';
    if (!groups[origin]) groups[origin] = [];
    groups[origin].push(w);
  });
  const order = ['Latin','Greek','French','French/Latin','Middle English','English'];

  container.innerHTML = `<div class="grouped-view">
    <div class="group-tiles">${order.filter(o => groups[o]).map(origin =>
      `<div class="group-tile" onclick="toggleGroup(this, 'orig-${origin.replace(/\//g,'-')}')">
        <div class="group-tile-name">${origin}</div>
        <div class="group-tile-count">${groups[origin].length} words</div>
      </div>`
    ).join('')}</div>
    ${order.filter(o => groups[o]).map(origin => {
      const words = groups[origin].sort((a,b) => a.word.localeCompare(b.word));
      const id = 'orig-' + origin.replace(/\//g,'-');
      return `<div class="group-expanded" id="${id}">
        <div class="group-word-tiles">${words.map(w =>
          `<div class="group-word-tile" onclick="toggleGroupWord(this, 'owd-${id}-${w.word}')">
            <div class="group-word-tile-name">${w.word}</div>
          </div>`
        ).join('')}</div>
        ${words.map(w => `<div class="group-word-detail" id="owd-${id}-${w.word}">${renderEntry(w, 0)}</div>`).join('')}
      </div>`;
    }).join('')}
  </div>`;
}

function renderWeb(container) {
  container.innerHTML = `<div class="web-container">${CLUSTERS.map((c, ci) =>
    `<div class="web-cluster">
      <div class="web-cluster-title">${c.title}</div>
      <div class="web-cluster-desc">${c.desc}</div>
      <div class="web-words">${c.words.map(wName => {
        const w = ALL_WORDS.find(x => x.word === wName);
        return w ? `<div class="web-word" onclick="toggleWebDetail('wd-${ci}-${wName}')">${w.word}</div>` : '';
      }).join('')}</div>
      ${c.words.map(wName => {
        const w = ALL_WORDS.find(x => x.word === wName);
        if (!w) return '';
        return `<div class="web-word-detail" id="wd-${ci}-${wName}"><strong>${w.word}</strong> (${w.partOfSpeech}) — ${w.definitions[0]}</div>`;
      }).join('')}
    </div>`
  ).join('')}</div>`;
}

function toggleQuiz(id) { document.getElementById(id).classList.toggle('open'); }

function toggleWebDetail(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.parentElement.querySelectorAll('.web-word-detail').forEach(d => { if (d.id !== id) d.classList.remove('open'); });
  el.classList.toggle('open');
}

function toggleGroup(tile, id) {
  const el = document.getElementById(id);
  if (!el) return;
  const isOpen = el.classList.contains('open');
  // Close all expanded groups
  document.querySelectorAll('.group-expanded').forEach(g => g.classList.remove('open'));
  document.querySelectorAll('.group-tile').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.group-word-detail').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.group-word-tile').forEach(t => t.classList.remove('active'));
  if (!isOpen) {
    el.classList.add('open');
    tile.classList.add('active');
    setTimeout(() => el.scrollIntoView({ behavior:'smooth', block:'start' }), 100);
  }
}

function toggleGroupWord(tile, id) {
  const el = document.getElementById(id);
  if (!el) return;
  const isOpen = el.classList.contains('open');
  // Close other word details in same group
  el.parentElement.querySelectorAll('.group-word-detail').forEach(d => d.classList.remove('open'));
  el.parentElement.querySelectorAll('.group-word-tile').forEach(t => t.classList.remove('active'));
  if (!isOpen) {
    el.classList.add('open');
    tile.classList.add('active');
    setTimeout(() => el.scrollIntoView({ behavior:'smooth', block:'nearest' }), 100);
  }
}

function handleQuiz(btn) {
  if (btn.classList.contains('answered')) return;
  const qid = btn.dataset.qid, ok = btn.dataset.correct === 'true';
  document.querySelectorAll(`[data-qid="${qid}"]`).forEach(b => {
    b.classList.add('answered');
    if (b.dataset.correct === 'true') b.classList.add('correct');
    else if (b === btn && !ok) b.classList.add('wrong');
    else b.classList.add('dimmed');
  });
  const r = document.getElementById(`${qid}-r`);
  r.classList.add('show');
  if (ok) { r.textContent = 'Correct.'; }
  else { r.textContent = 'Not quite — the correct answer is highlighted above.'; document.getElementById(`${qid}-c`).classList.add('show'); }
}

// IPA tooltip via event delegation
document.addEventListener('click', function(e) {
  // Remove any existing tooltip first
  document.querySelectorAll('.ipa-tooltip').forEach(t => t.remove());
  const sym = e.target.closest('.ipa-sym');
  if (!sym) return;
  const key = sym.dataset.ipa;
  const desc = IPA_LOOKUP[key];
  if (!desc) return;
  const tip = document.createElement('span');
  tip.className = 'ipa-tooltip';
  tip.textContent = desc;
  sym.appendChild(tip);
});

fetch('words.json').then(r=>r.json()).then(renderEntries).catch(()=>{
  document.getElementById('entries').innerHTML='<p style="text-align:center;padding:3rem;color:var(--ink-muted)">Unable to load words.</p>';
});
</script>
</body>
</html>
